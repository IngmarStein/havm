# havm configuration example
# Copy to ~/.config/havm/config.yml and customize as needed.
# All fields are optional — havm run works with zero config.

# Virtual machine resource limits
vm:
  cpu_count: 4                # default: 4
  memory_size: "4 GiB"        # default: 4 GiB
  disk_size: "32 GiB"         # default: 32 GiB

# Network configuration
network:
  # bridge: VM gets its own IP on your LAN (requires paid developer account).
  # nat:    VM is behind NAT (default, works without extra entitlements).
  type: nat
  # interface: override auto-detected bridge interface
  # interface: "en0"
  # mac: stable locally-administered MAC address (e.g., "02:00:00:00:00:01").
  #      If not set, a random MAC is generated and persisted on first boot.
  # mac: "02:00:00:00:00:01"
  # hostname: "homeassistant.local"  # mDNS hostname or static IP for reaching the guest

# Home Assistant OS release channel
haos:
  # stable (default) or pre-release
  release_channel: stable

# SSH key import (HA OS imports authorized_keys on boot for root SSH on port 22222)
ssh:
  authorized_keys: "~/.ssh/id_ed25519.pub"

# USB device passthrough
usb:
  enabled: true               # enable USB accessory passthrough (default: true)

# Logging
logging:
  # Format: text (default, human-readable) or json (NDJSON, one object per line)
  format: text
  # Level: debug, info (default), warning, error
  level: info

# Home Assistant connection settings (URL and API token).
# Used for shutdown and web UI readiness detection.
ha:
  # Base URL of the Home Assistant instance (default: http://<discovered-ip>:8123).
  # Override if HA uses a different port or HTTPS.
  # url: "https://homeassistant.local:443"
  # Long-lived access token for REST API calls.
  # Create one at: http://<your-ha-ip>:8123/profile/security
  # api_token: "eyJ..."

# Metrics endpoint for Prometheus scraping
metrics:
  enabled: true               # default: false
  # type: prometheus          # prometheus (default) — extensible to OTLP in the future
  # prometheus:
  #   port: 9210              # default: 9210
  #   host: "127.0.0.1"       # default: "127.0.0.1" — set to "0.0.0.0" for LAN access

# Shutdown behavior on SIGTERM/SIGINT
shutdown:
  timeout_seconds: 30         # max wait for guest to halt (default: 30)
