name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 27
        run: |
          # Pre-release Xcode first, then stable.
          for dir in \
            /Applications/Xcode-beta.app/Contents/Developer \
            /Applications/Xcode_27*.app/Contents/Developer; do
            if [ -d "$dir" ] && [ -x "$dir/usr/bin/xcodebuild" ]; then
              echo "DEVELOPER_DIR=$dir" >> "$GITHUB_ENV"
              echo "$($dir/usr/bin/xcodebuild -version | head -1)"
              exit 0
            fi
          done
          echo "Error: Xcode 27 not found" >&2
          exit 1

      - name: Import Developer ID certificate
        if: vars.DEVELOPMENT_TEAM != '' && secrets.DEVELOPER_ID_CERT != ''
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          echo "$DEVELOPER_ID_CERT" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k ~/Library/Keychains/login.keychain-db \
            -P "$DEVELOPER_ID_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$DEVELOPER_ID_PASSWORD" ~/Library/Keychains/login.keychain-db

      - name: Build and sign (Developer ID — tier 3)
        if: vars.DEVELOPMENT_TEAM != '' && secrets.DEVELOPER_ID_CERT != ''
        env:
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
          CODE_SIGN_IDENTITY: ${{ vars.DEVELOPER_ID }}
          ENTITLEMENTS_TIER: "3"
        run: |
          ./scripts/build.sh release

      - name: Build and sign (ad-hoc — tier 1)
        if: vars.DEVELOPMENT_TEAM == '' || secrets.DEVELOPER_ID_CERT == ''
        env:
          ENTITLEMENTS_TIER: "1"
          CODE_SIGN_IDENTITY: "-"
        run: |
          ./scripts/build.sh release

      - name: Package
        run: |
          # VERSION prevents Homebrew from cd-ing into the single-directory
          # archive. Without it, libexec.install "Havm.app" would fail because
          # Homebrew stages into Havm.app/ and can't find Havm.app inside it.
          echo "${GITHUB_REF_NAME#v}" > .build/VERSION
          (cd .build && zip -qr "$OLDPWD/havm.zip" Havm.app VERSION)

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: havm.zip
          body: |
            ## havm — Home Assistant OS VM for Apple Silicon

            Zero-config CLI for running Home Assistant OS on macOS 27+ using the
            native Virtualization framework.

            ### Requirements
            - macOS 27 (Golden Gate) or later
            - Apple Silicon Mac

            ### Install

            ```bash
            unzip havm.zip
            Havm.app/Contents/MacOS/havm run
            ```
          generate_release_notes: true
