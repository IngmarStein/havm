name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      HAS_DEV_CERT: ${{ secrets.DEVELOPER_ID_CERT || '' }}

    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 27
        run: |
          for dir in \
            /Applications/Xcode-beta.app/Contents/Developer \
            /Applications/Xcode_27*.app/Contents/Developer; do
            if [ -d "$dir" ] && [ -x "$dir/usr/bin/xcodebuild" ]; then
              echo "DEVELOPER_DIR=$dir" >> "$GITHUB_ENV"
              echo "$($dir/usr/bin/xcodebuild -version | head -1)"
              exit 0
            fi
          done
          echo "Error: Xcode 27 not found" >&2
          exit 1

      - name: Update version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(grep 'static let current' Sources/Havm/main.swift | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CURRENT" != "$VERSION" ]; then
            echo "    $CURRENT -> $VERSION"
            sed -i '' "s/static let current = \"$CURRENT\"/static let current = \"$VERSION\"/" Sources/Havm/main.swift
          fi

      - name: Ensure Developer ID certificate
        if: vars.DEVELOPMENT_TEAM != '' && env.HAS_DEV_CERT != ''
        env:
          DEVELOPER_ID_CERT: ${{ env.HAS_DEV_CERT }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          # Self-hosted runner: cert already in keychain, skip import.
          if security find-identity -v -p basic | grep -q "Developer ID"; then
            echo "Developer ID certificate found in keychain."
            exit 0
          fi
          # Ephemeral runner: import from secrets.
          echo "$DEVELOPER_ID_CERT" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k ~/Library/Keychains/login.keychain-db \
            -P "$DEVELOPER_ID_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$DEVELOPER_ID_PASSWORD" ~/Library/Keychains/login.keychain-db

      - name: Build and sign (Developer ID — tier 3)
        if: vars.DEVELOPMENT_TEAM != '' && env.HAS_DEV_CERT != ''
        env:
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
          CODE_SIGN_IDENTITY: ${{ vars.DEVELOPER_ID }}
          ENTITLEMENTS_TIER: "3"
        run: ./scripts/build.sh release

      - name: Build and sign (ad-hoc — tier 1)
        if: vars.DEVELOPMENT_TEAM == '' || env.HAS_DEV_CERT == ''
        env:
          ENTITLEMENTS_TIER: "1"
          CODE_SIGN_IDENTITY: "-"
        run: ./scripts/build.sh release

      - name: Package
        run: |
          # VERSION prevents Homebrew from cd-ing into the single-directory
          # archive. Without it, libexec.install "Havm.app" would fail because
          # Homebrew stages into Havm.app/ and can't find Havm.app inside it.
          echo "${GITHUB_REF_NAME#v}" > .build/VERSION
          (cd .build && zip -qr "$OLDPWD/havm.zip" Havm.app VERSION)

      - name: Notarize
        if: vars.DEVELOPMENT_TEAM != '' && env.HAS_DEV_CERT != ''
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ vars.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ vars.NOTARY_ISSUER }}
        run: |
          echo "$NOTARY_KEY" > notary.p8
          trap "rm -f notary.p8" EXIT
          echo "==> Submitting for notarization..."
          if xcrun notarytool submit havm.zip \
              --key notary.p8 \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER" \
              --wait --timeout 5m 2>&1 | tee notary.log | grep -q "status: Accepted"; then
            echo "    Notarization: Accepted"
          else
            echo "Error: notarization failed."
            SUBMIT_ID=$(grep "id:" notary.log | head -1 | awk '{print $NF}')
            if [ -n "$SUBMIT_ID" ]; then
              echo "--- Notarization log ---"
              xcrun notarytool log "$SUBMIT_ID" \
                --key notary.p8 \
                --key-id "$NOTARY_KEY_ID" \
                --issuer "$NOTARY_ISSUER"
            fi
            exit 1
          fi

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$tag" \
            --repo="${GITHUB_REPOSITORY}" \
            --title="${GITHUB_REPOSITORY#*/} ${tag#v}" \
            --generate-notes \
            havm.zip
