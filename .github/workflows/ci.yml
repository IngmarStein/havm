name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # Requires macOS 27 (Golden Gate) — Xcode 17+.
    # Until GitHub provides runners, use your Mac as a self-hosted runner:
    #   Settings → Actions → Runners → New self-hosted runner → macOS ARM64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          for xcode in /Applications/Xcode_17*.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode"
              echo "Selected: $xcode"
              break
            fi
          done
          echo "Using: $(xcode-select -p)"

      - name: Build
        run: |
          ENTITLEMENTS_TIER=1 \
          CODE_SIGN_IDENTITY="-" \
          ./scripts/build.sh release

      - name: Test
        run: swift test
